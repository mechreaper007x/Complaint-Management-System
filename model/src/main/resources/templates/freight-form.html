<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
  <h1 class="h4 mb-3">New Freight</h1>
  <form class="card shadow-sm p-3" th:action="@{/freights}" th:object="${freight}" method="post">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Origin</label>
        <input class="form-control" th:field="*{origin}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Destination</label>
        <input class="form-control" th:field="*{destination}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Customer</label>
        <input class="form-control" th:field="*{customer}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Status</label>
        <select class="form-select" th:field="*{status}">
          <option value="IN_TRANSIT">IN_TRANSIT</option>
          <option value="DELIVERED">DELIVERED</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Departure Date</label>
        <input type="date" class="form-control" th:field="*{departureDate}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Arrival Date</label>
        <input type="date" class="form-control" th:field="*{arrivalDate}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Carrier</label>
        <input class="form-control" th:field="*{carrier}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Tracking Number</label>
        <input class="form-control" th:field="*{trackingNumber}">
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary"><i class="bi bi-save me-1"></i> Save</button>
      <a class="btn btn-outline-secondary" th:href="@{/freights}">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
