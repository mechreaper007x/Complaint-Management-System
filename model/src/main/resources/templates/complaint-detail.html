<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: content(~{::body})}">
<body>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0" th:text="${complaint.title}">Complaint</h1>
    <div>
      <a class="btn btn-outline-secondary me-2" th:href="@{/complaints}">
        <i class="bi bi-arrow-left"></i> Back
      </a>
      <form th:action="@{/complaints/{id}/delete(id=${complaint.id})}" method="post" class="d-inline">
        <button class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
      </form>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="mb-2">
            <span class="badge me-1 bg-secondary" th:text="${complaint.category}">Category</span>
            <span th:class="'badge me-1 ' + ${complaint.priority=='HIGH'?'bg-danger':(complaint.priority=='MEDIUM'?'bg-warning text-dark':'bg-success')}"
                  th:text="${complaint.priority}">HIGH</span>
            <span th:class="'badge rounded-pill ' + ${complaint.status=='OPEN'?'bg-primary':(complaint.status=='IN_PROGRESS'?'bg-warning text-dark':(complaint.status=='RESOLVED'?'bg-success':'bg-dark'))}"
                  th:text="${complaint.status}">OPEN</span>
          </div>
          <p class="mb-0" th:text="${complaint.description}">Description...</p>
        </div>
        <div class="card-footer small text-muted">
          Created:
          <span th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy HH:mm')}"></span> • Updated:
          <span th:text="${#temporals.format(complaint.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold"><i class="bi bi-wrench-adjustable-circle me-1"></i>Admin Actions</div>
        <div class="card-body">
          <form th:action="@{/complaints/{id}/status(id=${complaint.id})}" method="post" class="vstack gap-2">
            <select class="form-select" name="status">
              <option>OPEN</option><option>IN_PROGRESS</option><option>RESOLVED</option><option>REJECTED</option>
            </select>
            <textarea class="form-control" name="notes" rows="3" placeholder="Resolution notes (optional)"
                      th:text="${complaint.resolutionNotes}"></textarea>
            <button class="btn btn-primary w-100">
              <i class="bi bi-arrow-repeat me-1"></i> Update Status
            </button>
          </form>
        </div>
      </div>

      <div class="card shadow-sm mt-3">
        <div class="card-header fw-semibold"><i class="bi bi-person-lines-fill me-1"></i>Reporter</div>
        <div class="card-body small">
          <div><span class="text-muted">Name:</span> <span th:text="${complaint.reporterName}">—</span></div>
          <div><span class="text-muted">Email:</span> <span th:text="${complaint.reporterEmail}">—</span></div>
          <div><span class="text-muted">Phone:</span> <span th:text="${complaint.reporterPhone}">—</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
