<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${pageTitle} ?: 'Freight Management'">Freight Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/freights}">
      <i class="bi bi-truck me-2"></i>FMS
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/freights}">Freights</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/freights/new}">New</a></li>
      </ul>
      <span class="navbar-text text-muted small">v1.0</span>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div th:if="${flash}" class="alert alert-success d-flex align-items-center" role="alert">
    <i class="bi bi-check2-circle me-2"></i><span th:text="${flash}">Saved</span>
  </div>
  <div layout:fragment="content"></div>
</main>

<footer class="border-top bg-white py-3">
  <div class="container small text-muted d-flex justify-content-between">
    <span>Freight Management System</span>
    <span>&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span></span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Place the Delete Modal HTML block BELOW this line -->
<div class="modal fade" id="confirmDelete" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Delete freight?</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <form id="deleteForm" method="post">
          <button class="btn btn-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ✅ And right below that, add the controlling JavaScript -->
<script>
  const delModal = document.getElementById('confirmDelete');
  delModal?.addEventListener('show.bs.modal', e=>{
    const form = document.getElementById('deleteForm');
    form.action = e.relatedTarget?.dataset?.action || form.action;
  });
</script>

</body>
</html>
