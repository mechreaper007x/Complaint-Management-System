<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: content(~{::body})}">
<body>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Complaints</h1>
    <a class="btn btn-primary" th:href="@{/complaints/new}">
      <i class="bi bi-plus-lg me-1"></i> New Complaint
    </a>
  </div>

  <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/complaints}">
    <div class="col-md-3">
      <label class="form-label">Status</label>
      <select class="form-select" name="status">
        <option th:selected="${param.status == null}" value="">All</option>
        <option th:selected="${param.status == 'OPEN'}">OPEN</option>
        <option th:selected="${param.status == 'IN_PROGRESS'}">IN_PROGRESS</option>
        <option th:selected="${param.status == 'RESOLVED'}">RESOLVED</option>
        <option th:selected="${param.status == 'REJECTED'}">REJECTED</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Category</label>
      <input class="form-control" name="category" th:value="${param.category}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Search title</label>
      <input class="form-control" name="q" placeholder="e.g. Wi-Fi" th:value="${param.q}">
    </div>
    <div class="col-md-3">
      <button class="btn btn-outline-secondary w-100" type="submit">
        <i class="bi bi-funnel me-1"></i> Filter
      </button>
    </div>
  </form>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Created</th><th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="c : ${complaints}">
            <td th:text="${c.id}">1</td>
            <td>
              <a th:href="@{/complaints/{id}(id=${c.id})}" class="link-body-emphasis fw-semibold"
                 th:text="${c.title}">Title</a>
              <div class="text-muted small" th:text="${#strings.abbreviate(c.description, 0, 80)}"></div>
            </td>
            <td><span class="badge bg-secondary" th:text="${c.category}">Hostel</span></td>
            <td>
              <span th:class="'badge ' + ${c.priority=='HIGH'?'bg-danger':(c.priority=='MEDIUM'?'bg-warning text-dark':'bg-success')}"
                    th:text="${c.priority}">HIGH</span>
            </td>
            <td>
              <span th:class="'badge rounded-pill ' + ${c.status=='OPEN'?'bg-primary':(c.status=='IN_PROGRESS'?'bg-warning text-dark':(c.status=='RESOLVED'?'bg-success':'bg-dark'))}"
                    th:text="${c.status}">OPEN</span>
            </td>
            <td th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy HH:mm')}">08 Nov 2025</td>
            <td class="text-end">
              <a th:href="@{/complaints/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-eye"></i>
              </a>              <button class="btn btn-sm btn-outline-danger"
                      data-bs-toggle="modal"
                      data-bs-target="#confirmDelete"
                      th:attr="data-action=@{/complaints/{id}/delete(id=${c.id})}">
                <i class="bi bi-trash"></i>
              </button>

            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(complaints)}">
            <td colspan="7" class="text-center py-5 text-muted">No complaints found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
