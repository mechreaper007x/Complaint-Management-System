<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: content(~{::body})}">
<body>
  <h1 class="h4 mb-3">New Complaint</h1>
  <form class="card shadow-sm p-3" th:action="@{/complaints}" th:object="${complaint}" method="post">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Title</label>
        <input class="form-control" th:field="*{title}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Category</label>
        <input class="form-control" th:field="*{category}" placeholder="IT/Hostel/Transport" required>
      </div>
      <div class="col-12">
        <label class="form-label">Description</label>
        <textarea class="form-control" th:field="*{description}" rows="5" required></textarea>
      </div>
      <div class="col-md-4">
        <label class="form-label">Priority</label>
        <select class="form-select" th:field="*{priority}">
          <option>LOW</option><option>MEDIUM</option><option>HIGH</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Your Name</label>
        <input class="form-control" th:field="*{reporterName}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" th:field="*{reporterEmail}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input class="form-control" th:field="*{reporterPhone}">
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary"><i class="bi bi-save me-1"></i> Save</button>
      <a class="btn btn-outline-secondary" th:href="@{/complaints}">Cancel</a>
    </div>
  </form>
</body>
</html>
